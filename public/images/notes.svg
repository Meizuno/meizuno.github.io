<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
  </defs>

  <!-- Paper shape with folded top-right corner -->
  <path d="M 26 22 L 124 22 L 158 56 L 158 168 L 26 168 Z" fill="url(#paper)"/>

  <!-- Fold: darker triangle so the corner reads as folded -->
  <path d="M 124 22 L 158 56 L 124 56 Z" fill="#3b0764" fill-opacity="0.55"/>

  <!-- Text bars: soft white overlay -->
  <g fill="#fff" fill-opacity="0.85">
    <rect x="44" y="82"  width="84" height="9" rx="4.5"/>
    <rect x="44" y="100" width="70" height="9" rx="4.5"/>
    <rect x="44" y="118" width="78" height="9" rx="4.5"/>
    <rect x="44" y="136" width="52" height="9" rx="4.5"/>
  </g>
</svg>
