<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <defs>
    <linearGradient id="stack" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>

  <!-- Three stacked server / node units -->
  <rect x="28" y="34" width="124" height="32" rx="9" fill="url(#stack)"/>
  <rect x="28" y="74" width="124" height="32" rx="9" fill="url(#stack)"/>
  <rect x="28" y="114" width="124" height="32" rx="9" fill="url(#stack)"/>

  <!-- Status LEDs (healthy) on each unit -->
  <g fill="#fff">
    <circle cx="46" cy="50" r="5"/>
    <circle cx="46" cy="90" r="5"/>
    <circle cx="46" cy="130" r="5"/>
  </g>

  <!-- Activity bars on each unit -->
  <g fill="#fff" fill-opacity="0.85">
    <rect x="64" y="46" width="70" height="8" rx="4"/>
    <rect x="64" y="86" width="56" height="8" rx="4"/>
    <rect x="64" y="126" width="64" height="8" rx="4"/>
  </g>
</svg>
